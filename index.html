<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walt Disney World Daily Trivia</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!--
      Single-page layout:
      - Top: title
      - Middle: category grid (primary navigation)
      - Overlay: question modal (rendered/controlled by js/app.js)
    -->
    <!-- Decorative Mickey image on the right side of the screen -->
    <img class="mickey-figure" src="assets/img/mickey.webp" alt="Mickey Mouse" aria-hidden="true">

    <!-- EDITED: Added Minnie Mouse image on the left side of the screen -->
    <img class="minnie-figure" src="assets/img/minniemouse.png" alt="Minnie Mouse" aria-hidden="true">

    <main class="page" role="main">
        <h1 class="title">Daily Walt Disney World Trivia</h1>

        <!-- Category buttons map 1:1 to `category` values in data/questions.json -->
        <section class="category-grid" aria-label="Trivia categories">
            <button class="category-card" type="button" data-category="magic-kingdom">
                <span class="category-card__label">Magic Kingdom</span>
            </button>

            <button class="category-card" type="button" data-category="epcot">
                <span class="category-card__label">Epcot</span>
            </button>

            <button class="category-card" type="button" data-category="hollywood-studios">
                <span class="category-card__label">Hollywood<br>Studios</span>
            </button>

            <button class="category-card" type="button" data-category="animal-kingdom">
                <span class="category-card__label">Animal<br>Kingdom</span>
            </button>

            <button class="category-card" type="button" data-category="resorts">
                <span class="category-card__label">Resorts</span>
            </button>

            <button class="category-card" type="button" data-category="dining">
                <span class="category-card__label">Dining</span>
            </button>

            <button class="category-card" type="button" data-category="transportation">
                <span class="category-card__label">Transportation</span>
            </button>

            <button class="category-card" type="button" data-category="shows-entertainment">
                <span class="category-card__label">Shows &amp;<br>Entertainment</span>
            </button>

            <button class="category-card" type="button" data-category="history">
                <span class="category-card__label">History</span>
            </button>
        </section>

        <!-- Footer for Date, Game Number, and Timer -->
        <footer class="game-footer">
            <div class="game-stats">
                <span id="game-date"></span> &nbsp;|&nbsp;
                <span>Game #1</span> &nbsp;|&nbsp;
                <span id="game-timer">00:00</span>
            </div>
            <div class="social-link">Follow us on Tiktok - @wdwtrivia</div>
            <div class="disclaimer-link">Not affiliated with The Walt DisneyCompany</div>
        </footer>
    </main>

    <!-- Question modal: hidden by default; opened by JS when a category is selected -->
    <div class="modal" id="question-modal" aria-hidden="true">
        <div class="modal__backdrop" data-close-modal tabindex="-1"></div>
        <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="question-title">
            <div class="modal__header">
                <div class="modal__titles">
                    <div class="modal__kicker" id="question-category"></div>
                    <h2 class="modal__title" id="question-title">Trivia Time</h2>
                </div>
                <button class="icon-btn" type="button" data-close-modal aria-label="Close">×</button>
            </div>

            <div class="modal__body">
                <p class="question" id="question-text"></p>
                <div class="answers" id="answers"></div>
                <p class="feedback" id="feedback" aria-live="polite"></p>
            </div>
        </div>
    </div>

    <!-- JS is loaded last so the DOM is available immediately -->
    <script src="js/app.js"></script>
</body>

</html>
